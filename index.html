<script>


(function() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const el = entry.target;
      if (entry.isIntersecting) {
        el.style.visibility = 'visible';
        el.style.opacity = '1';
        el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        el.style.transform = 'translateY(0)';
      } else {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        setTimeout(() => {
          if (el.style.opacity === '0') el.style.visibility = 'hidden';
        }, 400);
      }
    });
  }, {
    root: document.querySelector('.scrollbar-hide') || null,
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
  });

  document.querySelectorAll('.absolute').forEach(wrapper => {
    const inner = wrapper.querySelector('[style]');
    if (inner) {
      inner.style.transform = 'translateY(20px)';
      observer.observe(inner);
    }
  });

  document.querySelectorAll('[style*="animation"][style*="fadeIn"]').forEach(el => observer.unobserve(el));
})();


var targetDate = new Date("May 30, 2026 20:00:00").getTime();
var countdownTimer = countdown(
    targetDate,
    function(ts) {
        var countdownText = `
            <div class="time-container mr_5 p_2 ">
                <span class="fspx_40">${ts.days}</span>
                <p>Días</p>
            </div>
            <div class="time-container mr_5 p_2 ">
                <span class="fspx_40">${ts.hours}</span>
                <p>Horas</p>
            </div>
            <div class="time-container mr_5 p_2 ">
                <span class="fspx_40">${ts.minutes}</span>
                <p>Minutos</p>
            </div>
            <div class="time-container p_2 ">
                <span class="fspx_40">${ts.seconds}</span>
                <p>Segundos</p>
            </div>
        `;

        document.getElementById("countdown").innerHTML = countdownText;
    },
    countdown.DAYS | countdown.HOURS | countdown.MINUTES | countdown.SECONDS
);




const audio = document.getElementById("bgAudio");
const btn = document.getElementById("audioBtn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
btn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        playIcon.classList.add("hidden");
        pauseIcon.classList.remove("hidden");
    } else {
        audio.pause();
        pauseIcon.classList.add("hidden");
        playIcon.classList.remove("hidden");
    }
});

    
</script>
